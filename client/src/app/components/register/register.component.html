<div class="auth-wrapper" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  <div class="glass-panel" style="width: 100%; max-width: 440px; padding: 2.5rem; border-radius: var(--border-radius-lg); position: relative; box-shadow: var(--glass-shadow);">
    
    <!-- Branding Header -->
    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: var(--border-radius-sm); background: linear-gradient(135deg, var(--accent-violet) 0%, var(--accent-cyan) 100%); margin-bottom: 1.25rem; box-shadow: var(--glow-shadow-violet);">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <h2 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; background: var(--title-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Get Started</h2>
      <p style="font-size: 0.875rem; color: var(--text-secondary);">Create your administrator account</p>
    </div>

    <!-- Error Message Banner -->
    <div *ngIf="errorMessage" class="badge-error" style="padding: 0.75rem 1rem; border-radius: var(--border-radius-sm); font-size: 0.85rem; font-weight: 500; margin-bottom: 1.5rem; text-align: center;">
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <form (submit)="onSubmit($event)">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input class="form-input" type="text" id="name" [(ngModel)]="name" name="name" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Work Email</label>
        <input class="form-input" type="email" id="email" [(ngModel)]="email" name="email" placeholder="john.doe@company.com" required>
      </div>

      <div class="form-group" style="margin-bottom: 2rem;">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>

      <button class="btn btn-primary" type="submit" style="width: 100%; height: 48px;" [disabled]="loading">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading">Creating account...</span>
      </button>
    </form>

    <!-- Sign in trigger link -->
    <div style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-secondary);">
      Already have an account? 
      <a routerLink="/login" style="color: var(--accent-violet); font-weight: 600; text-decoration: none; transition: var(--transition-smooth); margin-left: 0.25rem;">Sign In</a>
    </div>

  </div>
</div>
