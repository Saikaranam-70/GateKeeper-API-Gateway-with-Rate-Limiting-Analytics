<!-- Floating Theme Toggle (unauthenticated only) -->
<div *ngIf="!currentUser" style="position: fixed; top: 1.5rem; right: 1.5rem; z-index: 1000;">
  <button (click)="toggleTheme()" class="btn btn-glass" style="padding: 0.6rem; border-radius: 50%; min-width: 40px; height: 40px; border-color: var(--glass-border); display: flex; align-items: center; justify-content: center;" title="Toggle Theme">
    <svg *ngIf="theme === 'dark'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
    </svg>
    <svg *ngIf="theme === 'light'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
    </svg>
  </button>
</div>

<!-- Toast Notification System -->
<div class="toast-container">
  <div *ngFor="let t of toasts" class="toast" [class.toast-success]="t.type === 'success'" [class.toast-error]="t.type === 'error'" [class.toast-info]="t.type === 'info'" (click)="dismissToast(t.id)" style="cursor: pointer; display: flex; align-items: center; gap: 0.75rem;">
    <!-- Icon mapping -->
    <svg *ngIf="t.type === 'success'" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="m22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <svg *ngIf="t.type === 'error'" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" x2="12.01" y1="8" y2="8"/>
      <line x1="12" x2="12" y1="12" y2="16"/>
    </svg>
    <svg *ngIf="t.type === 'info'" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" x2="12" y1="16" y2="12"/>
      <line x1="12" x2="12.01" y1="8" y2="8"/>
    </svg>
    <span style="font-weight: 500; font-size: 0.85rem;">{{ t.text }}</span>
  </div>
</div>

<!-- Layout Wrapper -->
<div *ngIf="currentUser" style="display: flex; min-height: 100vh; flex-direction: row;">
  
  <!-- Glass Sidebar Navigation -->
  <aside class="glass-panel" style="width: 260px; min-height: 100vh; position: fixed; top: 0; left: 0; border-radius: 0; border-top: none; border-bottom: none; border-left: none; display: flex; flex-direction: column; justify-content: space-between; padding: 2rem 1.5rem; z-index: 500;">
    
    <!-- Branding -->
    <div>
      <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2.5rem; padding-left: 0.25rem;">
        <div style="width: 32px; height: 32px; border-radius: var(--border-radius-sm); background: linear-gradient(135deg, var(--accent-violet) 0%, var(--accent-cyan) 100%); display: flex; align-items: center; justify-content: center; box-shadow: var(--glow-shadow-violet);">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <span style="font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">GateKeeper</span>
      </div>

      <!-- Navigation Links -->
      <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
        
        <!-- Dashboard link -->
        <a routerLink="/dashboard" routerLinkActive="active-nav" style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: var(--border-radius-sm); color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: var(--transition-smooth);" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="7" height="9" x="3" y="3" rx="1"/>
            <rect width="7" height="5" x="14" y="3" rx="1"/>
            <rect width="7" height="9" x="14" y="12" rx="1"/>
            <rect width="7" height="5" x="3" y="16" rx="1"/>
          </svg>
          Dashboard
        </a>

        <!-- API Keys link -->
        <a routerLink="/api-keys" routerLinkActive="active-nav" style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: var(--border-radius-sm); color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: var(--transition-smooth);" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
          Access Keys
        </a>

        <!-- System Diagnostics Health link -->
        <a routerLink="/system-status" routerLinkActive="active-nav" style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: var(--border-radius-sm); color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: var(--transition-smooth);" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
          Diagnostics
        </a>

      </nav>
    </div>

    <!-- Bottom User Profile Info & Sign Out -->
    <div style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
      <!-- Theme Toggle in Sidebar -->
      <button (click)="toggleTheme()" class="btn btn-glass" style="width: 100%; justify-content: flex-start; padding: 0.5rem 1rem; font-size: 0.8rem; gap: 0.75rem; border-color: var(--glass-border);">
        <ng-container *ngIf="theme === 'dark'">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
          Light Theme
        </ng-container>
        <ng-container *ngIf="theme === 'light'">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
          </svg>
          Dark Theme
        </ng-container>
      </button>

      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--glass-bg-hover); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--accent-violet);">
          {{ currentUser.name ? currentUser.name.substring(0,2).toUpperCase() : 'U' }}
        </div>
        <div style="overflow: hidden;">
          <span style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-primary); white-space: nowrap; text-overflow: ellipsis; overflow: hidden;">{{ currentUser.name }}</span>
          <span style="display: block; font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; text-overflow: ellipsis; overflow: hidden;">{{ currentUser.email }}</span>
        </div>
      </div>
      <button (click)="logout()" class="btn btn-glass" style="width: 100%; justify-content: center; padding: 0.5rem 1rem; font-size: 0.8rem; border-color: rgba(239, 68, 68, 0.2); color: #fca5a5;">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
        Sign Out
      </button>
    </div>

  </aside>

  <!-- Content Container (offset by sidebar width) -->
  <main style="flex-grow: 1; margin-left: 260px; min-height: 100vh; display: flex; flex-direction: column;">
    
    <!-- Workspace Viewport -->
    <div style="flex-grow: 1; padding: 2.5rem 3.5rem; width: 100%; max-width: 1320px; margin: 0 auto;">
      <router-outlet></router-outlet>
    </div>

    <!-- Minimal footer -->
    <footer style="padding: 1.5rem 3.5rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.03); color: var(--text-muted); font-size: 0.75rem; font-family: monospace;">
      GATEKEEPER CONTROL PLANE &bull; VERSION 1.0.0
    </footer>

  </main>

</div>

<!-- Unauthenticated container (centered layout for Login/Register) -->
<div *ngIf="!currentUser" style="min-height: 100vh;">
  <router-outlet></router-outlet>
</div>

<!-- Extra Inline Styles for Nav items -->
<style>
  .nav-item:hover {
    background: var(--glass-bg-hover);
    color: var(--text-primary) !important;
  }
  
  .active-nav {
    background: rgba(99, 102, 241, 0.08) !important;
    color: var(--accent-violet) !important;
    border: 1px solid rgba(99, 102, 241, 0.2) !important;
    box-shadow: 0 0 10px rgba(99, 102, 241, 0.05);
    font-weight: 600 !important;
  }
</style>
